<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Наш рабочий стол</title>
    <style>
        /* ----- Базовые стили ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1a1e24;
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        /* имитация монитора */
        .monitor {
            max-width: 1300px;
            width: 100%;
            background: #0a0e14;
            border-radius: 16px 16px 8px 8px;
            padding: 20px 20px 10px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 2px solid #2a2f3a;
        }
        /* экран */
        .screen {
            background: #1a2a3a;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            min-height: 520px;
            box-shadow: inset 0 0 60px rgba(0,0,0,0.3);
        }
        /* ----- РАБОЧИЙ СТОЛ (фон) ----- */
        .desktop {
            position: relative;
            width: 100%;
            min-height: 540px;
            background: linear-gradient(145deg, #1d3b55 0%, #0f2537 100%);
            padding: 12px 14px 50px;
            overflow: hidden;
        }
        /* ----- ИКОНКИ (можно перетаскивать) ----- */
        .desktop-icon {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 72px;
            cursor: default;
            transition: filter 0.15s;
            padding: 6px 4px;
            border-radius: 8px;
        }
        .desktop-icon:hover {
            background: rgba(255,255,255,0.06);
            filter: brightness(1.2);
        }
        .desktop-icon .icon-img {
            font-size: 2.8rem;
            line-height: 1;
            margin-bottom: 2px;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.6));
            pointer-events: none;
        }
        .desktop-icon .icon-label {
            font-size: 0.65rem;
            color: #f0f4fa;
            text-shadow: 0 1px 6px rgba(0,0,0,0.9), 0 1px 2px rgba(0,0,0,0.7);
            text-align: center;
            background: rgba(0,0,0,0.2);
            padding: 2px 8px;
            border-radius: 10px;
            pointer-events: none;
            max-width: 72px;
            word-wrap: break-word;
            line-height: 1.2;
        }
        /* выделение при клике */
        .desktop-icon.selected {
            background: rgba(255,255,255,0.12);
            outline: 1px solid rgba(255,255,255,0.2);
        }
        /* ----- КОРЗИНА (особая) ----- */
        .desktop-icon.recycle {
            bottom: 16px;
            right: 16px;
            position: absolute;
        }
        /* ----- ПАНЕЛЬ ЗАДАЧ (снизу) ----- */
        .taskbar {
            background: #1c1f26;
            border-top: 1px solid #3a4050;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 4px 12px;
            min-height: 44px;
            backdrop-filter: blur(6px);
        }
        .taskbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .start-btn {
            background: #2a3140;
            border: none;
            color: #ddd;
            padding: 4px 14px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.1s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .start-btn:hover {
            background: #3a4358;
        }
        .taskbar-time {
            color: #c8d0dc;
            font-size: 0.75rem;
            letter-spacing: 0.3px;
        }
        .taskbar-icons {
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .taskbar-icons span {
            color: #aab4c4;
            font-size: 0.8rem;
        }
        /* ----- ПАПКА (внутреннее содержимое) ----- */
        .folder-window {
            position: absolute;
            top: 60px;
            left: 80px;
            width: 420px;
            max-width: 80%;
            background: #1e2532;
            border-radius: 10px 10px 8px 8px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.7);
            border: 1px solid #3a4358;
            z-index: 100;
            display: none;
        }
        .folder-window.open {
            display: block;
        }
        .folder-header {
            background: #2a3345;
            padding: 8px 14px;
            border-radius: 10px 10px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #e8edf5;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .folder-header .close-btn {
            background: none;
            border: none;
            color: #b0baca;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0 6px;
        }
        .folder-header .close-btn:hover {
            color: #f5a090;
        }
        .folder-body {
            padding: 14px 16px;
            color: #c8d0dc;
            min-height: 80px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .folder-body .empty-msg {
            color: #7a8a9e;
            font-style: italic;
            font-size: 0.9rem;
            width: 100%;
            text-align: center;
            padding: 20px 0;
        }
        .folder-body .file-item {
            background: #2b3445;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            border: 1px solid #3d475c;
        }
        /* контекстное меню */
        .context-menu {
            position: fixed;
            background: #1e2532;
            border: 1px solid #3f4a5e;
            border-radius: 8px;
            padding: 6px 0;
            min-width: 180px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 999;
            display: none;
        }
        .context-menu-item {
            padding: 8px 18px;
            color: #d0d7e0;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.08s;
        }
        .context-menu-item:hover {
            background: #2f3a4e;
        }
        .context-menu-item.danger:hover {
            background: #6a2e2e;
        }
        /* всплывающее уведомление */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2532;
            color: #e8edf5;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid #3f4a5e;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            display: none;
            z-index: 800;
            animation: fadeIn 0.2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        /* адаптив */
        @media (max-width: 700px) {
            .desktop-icon { width: 60px; }
            .desktop-icon .icon-img { font-size: 2.2rem; }
            .desktop-icon .icon-label { font-size: 0.55rem; }
            .folder-window { width: 90%; left: 5%; top: 40px; }
        }
        @media (max-width: 500px) {
            .taskbar { flex-wrap: wrap; gap: 4px; justify-content: center; }
            .taskbar-left { flex: 1 1 100%; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="monitor">
    <div class="screen">
        <!-- РАБОЧИЙ СТОЛ -->
        <div class="desktop" id="desktopArea" style="position:relative;">

            <!-- Стартовые папки -->
            <div class="desktop-icon" data-folder="history" style="left:24px; top:24px;">
                <span class="icon-img">📖</span>
                <span class="icon-label">Наша история</span>
            </div>
            <div class="desktop-icon" data-folder="growth" style="left:112px; top:24px;">
                <span class="icon-img">🌱</span>
                <span class="icon-label">Наш рост</span>
            </div>
            <div class="desktop-icon" data-folder="moments" style="left:200px; top:24px;">
                <span class="icon-img">💌</span>
                <span class="icon-label">Искренние моменты</span>
            </div>
            <div class="desktop-icon" data-folder="letters" style="left:288px; top:24px;">
                <span class="icon-img">✉️</span>
                <span class="icon-label">Мои письма</span>
            </div>
            <div class="desktop-icon" data-folder="playlist" style="left:376px; top:24px;">
                <span class="icon-img">🎵</span>
                <span class="icon-label">Наш плейлист</span>
            </div>

            <!-- КОРЗИНА (всегда внизу справа) -->
            <div class="desktop-icon recycle" id="recycleBin" style="bottom:20px; right:20px;">
                <span class="icon-img" id="recycleIcon">🗑️</span>
                <span class="icon-label">Корзина</span>
            </div>

            <!-- ОКНО ПАПКИ (всплывает при двойном клике) -->
            <div class="folder-window" id="folderWindow">
                <div class="folder-header">
                    <span id="folderTitle">Папка</span>
                    <button class="close-btn" id="folderClose">✕</button>
                </div>
                <div class="folder-body" id="folderBody">
                    <div class="empty-msg">📂 Папка пуста</div>
                </div>
            </div>
        </div>

        <!-- ПАНЕЛЬ ЗАДАЧ -->
        <div class="taskbar">
            <div class="taskbar-left">
                <button class="start-btn" id="createFolderBtn">📁 + Создать папку</button>
                <span style="color:#6a7a8e; font-size:0.7rem;">|</span>
                <span style="color:#6a7a8e; font-size:0.7rem;" id="counterDisplay">5 папок</span>
            </div>
            <div class="taskbar-icons">
                <span id="taskbarTime">00:00</span>
            </div>
        </div>
    </div>
</div>

<!-- КОНТЕКСТНОЕ МЕНЮ -->
<div class="context-menu" id="contextMenu">
    <div class="context-menu-item" data-action="rename">✏️ Переименовать</div>
    <div class="context-menu-item danger" data-action="delete">🗑️ Удалить</div>
</div>

<!-- ТОСТ-УВЕДОМЛЕНИЕ -->
<div class="toast" id="toast"></div>

<script>
    // =============================================
    // 1. ХРАНИЛИЩЕ ПАПОК
    // =============================================
    let folders = {
        history: { label: 'Наша история', icon: '📖' },
        growth: { label: 'Наш рост', icon: '🌱' },
        moments: { label: 'Искренние моменты', icon: '💌' },
        letters: { label: 'Мои письма', icon: '✉️' },
        playlist: { label: 'Наш плейлист', icon: '🎵' }
    };

    // содержимое папок (для демонстрации)
    const folderContents = {
        history: ['День знакомства', 'Первое свидание', 'Свадьба', 'Первый переезд'],
        growth: ['Тогда', 'Сейчас', 'Вместе'],
        moments: ['Спасибо, что ты есть', 'Я скучаю', 'Я люблю тебя'],
        letters: ['Первое письмо', 'Письмо после ссоры', 'Сегодня'],
        playlist: ['Первый трек', 'Песня разлуки', 'Наш гимн']
    };

    let folderCounter = 5; // для уникальных id новых папок
    let selectedIcon = null;
    let dragData = null;
    let contextTarget = null;

    // =============================================
    // 2. ЭЛЕМЕНТЫ DOM
    // =============================================
    const desktop = document.getElementById('desktopArea');
    const recycleBin = document.getElementById('recycleBin');
    const recycleIcon = document.getElementById('recycleIcon');
    const folderWindow = document.getElementById('folderWindow');
    const folderTitle = document.getElementById('folderTitle');
    const folderBody = document.getElementById('folderBody');
    const folderClose = document.getElementById('folderClose');
    const contextMenu = document.getElementById('contextMenu');
    const toast = document.getElementById('toast');
    const counterDisplay = document.getElementById('counterDisplay');
    const taskbarTime = document.getElementById('taskbarTime');

    // =============================================
    // 3. ЧАСЫ
    // =============================================
    function updateClock() {
        const now = new Date();
        const h = String(now.getHours()).padStart(2,'0');
        const m = String(now.getMinutes()).padStart(2,'0');
        taskbarTime.textContent = h + ':' + m;
    }
    updateClock();
    setInterval(updateClock, 30000);

    // =============================================
    // 4. ОТРИСОВКА ПАПОК НА РАБОЧЕМ СТОЛЕ
    // =============================================
    function renderIcons() {
        // удаляем все иконки кроме корзины
        document.querySelectorAll('.desktop-icon:not(.recycle)').forEach(el => el.remove());

        let top = 24, left = 24;
        const cols = 6;
        const gapX = 88, gapY = 94;

        for (const [id, data] of Object.entries(folders)) {
            const div = document.createElement('div');
            div.className = 'desktop-icon';
            div.dataset.folder = id;
            div.style.left = left + 'px';
            div.style.top = top + 'px';
            div.innerHTML = `
                <span class="icon-img">${data.icon}</span>
                <span class="icon-label">${data.label}</span>
            `;
            desktop.appendChild(div);

            // обновляем позицию для следующей
            left += gapX;
            if ((left + 80) > desktop.clientWidth - 20) {
                left = 24;
                top += gapY;
            }
        }

        // обновляем счётчик
        const count = Object.keys(folders).length;
        counterDisplay.textContent = count + ' папок';

        // прикрепляем события
        attachIconEvents();
    }

    // =============================================
    // 5. СОБЫТИЯ ДЛЯ ИКОНОК
    // =============================================
    function attachIconEvents() {
        document.querySelectorAll('.desktop-icon:not(.recycle)').forEach(icon => {
            // выделение
            icon.addEventListener('click', function(e) {
                if (e.detail === 1) {
                    document.querySelectorAll('.desktop-icon.selected').forEach(el => el.classList.remove('selected'));
                    this.classList.add('selected');
                    selectedIcon = this;
                }
            });

            // двойной клик -> открыть папку
            icon.addEventListener('dblclick', function() {
                const folderId = this.dataset.folder;
                if (folderId && folders[folderId]) {
                    openFolder(folderId);
                }
            });

            // ПКМ -> контекстное меню
            icon.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                contextTarget = this;
                contextMenu.style.display = 'block';
                contextMenu.style.left = e.clientX + 'px';
                contextMenu.style.top = e.clientY + 'px';
            });

            // Начало перетаскивания
            icon.addEventListener('mousedown', function(e) {
                if (e.button === 0 && !e.ctrlKey && !e.metaKey) {
                    const rect = this.getBoundingClientRect();
                    dragData = {
                        icon: this,
                        offsetX: e.clientX - rect.left,
                        offsetY: e.clientY - rect.top,
                        startX: parseInt(this.style.left) || 0,
                        startY: parseInt(this.style.top) || 0
                    };
                }
            });
        });
    }

    // =============================================
    // 6. ПЕРЕТАСКИВАНИЕ (DRAG & DROP)
    // =============================================
    document.addEventListener('mousemove', function(e) {
        if (!dragData) return;
        const parentRect = desktop.getBoundingClientRect();
        let newX = e.clientX - parentRect.left - dragData.offsetX;
        let newY = e.clientY - parentRect.top - dragData.offsetY;
        // ограничиваем, чтобы не вылезало
        const iconWidth = 72;
        const iconHeight = 72;
        newX = Math.max(0, Math.min(newX, desktop.clientWidth - iconWidth - 10));
        newY = Math.max(0, Math.min(newY, desktop.clientHeight - iconHeight - 70));
        dragData.icon.style.left = newX + 'px';
        dragData.icon.style.top = newY + 'px';
    });

    document.addEventListener('mouseup', function() {
        dragData = null;
    });

    // =============================================
    // 7. ОТКРЫТИЕ ПАПКИ
    // =============================================
    function openFolder(folderId) {
        const data = folders[folderId];
        if (!data) return;
        folderTitle.textContent = data.icon + ' ' + data.label;
        const content = folderContents[folderId] || ['(пусто)'];
        folderBody.innerHTML = '';
        if (content.length === 0 || (content.length === 1 && content[0] === '(пусто)')) {
            folderBody.innerHTML = '<div class="empty-msg">📂 Папка пуста</div>';
        } else {
            content.forEach(item => {
                const el = document.createElement('span');
                el.className = 'file-item';
                el.textContent = '📄 ' + item;
                folderBody.appendChild(el);
            });
        }
        folderWindow.classList.add('open');
    }

    folderClose.addEventListener('click', function() {
        folderWindow.classList.remove('open');
    });

    // закрываем папку при клике вне её
    document.addEventListener('click', function(e) {
        if (folderWindow.classList.contains('open')) {
            if (!folderWindow.contains(e.target)) {
                folderWindow.classList.remove('open');
            }
        }
    });

    // =============================================
    // 8. КОНТЕКСТНОЕ МЕНЮ
    // =============================================
    document.querySelectorAll('.context-menu-item').forEach(item => {
        item.addEventListener('click', function() {
            const action = this.dataset.action;
            if (!contextTarget) return;
            const folderId = contextTarget.dataset.folder;
            if (!folderId || !folders[folderId]) return;

            if (action === 'rename') {
                const newName = prompt('Новое имя папки:', folders[folderId].label);
                if (newName && newName.trim().length > 0) {
                    folders[folderId].label = newName.trim();
                    renderIcons();
                    showToast('✏️ Папка переименована');
                }
            } else if (action === 'delete') {
                if (confirm('Удалить папку "' + folders[folderId].label + '"?')) {
                    deleteFolder(folderId);
                }
            }
            contextMenu.style.display = 'none';
            contextTarget = null;
        });
    });

    // скрываем контекстное меню при клике вне
    document.addEventListener('click', function(e) {
        if (!contextMenu.contains(e.target)) {
            contextMenu.style.display = 'none';
        }
    });

    // =============================================
    // 9. УДАЛЕНИЕ ПАПКИ (в корзину)
    // =============================================
    function deleteFolder(folderId) {
        if (!folders[folderId]) return;
        delete folders[folderId];
        delete folderContents[folderId];
        renderIcons();
        // меняем иконку корзины на полную
        recycleIcon.textContent = '🗑️📄';
        showToast('🗑️ Папка удалена в корзину');
        // через 2 сек возвращаем пустую корзину (для красоты)
        setTimeout(() => {
            recycleIcon.textContent = '🗑️';
        }, 2000);
    }

    // =============================================
    // 10. СОЗДАНИЕ НОВОЙ ПАПКИ
    // =============================================
    document.getElementById('createFolderBtn').addEventListener('click', function() {
        const name = prompt('Название новой папки:', 'Новая папка');
        if (name && name.trim().length > 0) {
            const id = 'folder_' + (++folderCounter);
            folders[id] = { label: name.trim(), icon: '📁' };
            folderContents[id] = ['Новый файл'];
            renderIcons();
            showToast('📁 Создана папка "' + name.trim() + '"');
        }
    });

    // =============================================
    // 11. ТОСТ-УВЕДОМЛЕНИЯ
    // =============================================
    let toastTimeout;

    function showToast(text) {
        toast.textContent = text;
        toast.style.display = 'block';
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => {
            toast.style.display = 'none';
        }, 1800);
    }

    // =============================================
    // 12. ИНИЦИАЛИЗАЦИЯ
    // =============================================
    renderIcons();

    // Корзина тоже может быть кликабельной (просто для красоты)
    recycleBin.addEventListener('dblclick', function() {
        showToast('🗑️ Корзина пуста (все файлы удалены)');
    });

    console.log('💻 Рабочий стол Windows 10 готов!');
    console.log('📁 Папки можно перетаскивать, создавать и удалять.');
</script>
</body>
</html>
